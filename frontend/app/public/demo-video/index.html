<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InjectiveLens Agent Guard Demo Video</title>
    <style>
      :root {
        --ink: #16211e;
        --muted: #64746f;
        --line: #d6e4df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f8fcfa, #edf6f3);
      }

      main {
        width: min(1180px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 38px 0 52px;
      }

      header {
        text-align: center;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 10px auto 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.5;
      }

      .video-shell {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(21, 46, 39, 0.16);
        overflow: hidden;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #eef6f3;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>InjectiveLens Agent Guard Demo</h1>
        <p>
          中文旁白版：natural-language AI trading intent, Injective evidence,
          BLOCK decision, safer alternative simulation, and assessment proof review.
        </p>
      </header>

      <section class="video-shell">
        <video poster="./injectivelens_demo_poster.png" controls preload="metadata">
          <source src="./injectivelens_demo_zh_voiceover_music.mp4" type="video/mp4" />
          <source src="./injectivelens_demo_voiceover.mp4" type="video/mp4" />
          <source src="./injectivelens_demo.webm" type="video/webm" />
          Your browser does not support embedded playback.
          <a href="./injectivelens_demo_zh_voiceover_music.mp4">Open the Chinese narrated video file</a>.
        </video>
      </section>
    </main>
  </body>
</html>
